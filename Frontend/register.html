<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Register</title>
	<link rel="stylesheet" href="register.css">
	<style>
		:root{box-sizing:border-box}
		*,*::before,*::after{box-sizing:inherit}
	</style>
</head>
<body>
	<iframe class="header-embed" src="header.html" title="Site Header" loading="eager"></iframe>

	<main class="main-container">
		<section class="logo-panel" aria-label="Logo O'Future">
			<img src="loginbd.html/Logo.png" alt="O'Future logo" class="logo-image">
		</section>

		<section class="register-box" aria-label="Dang ky">
			<div class="register-title">REGISTER</div>
			<form>
				<div class="input-group"><input type="text" placeholder="Full Name" autocomplete="name"></div>
				<div class="input-group"><input type="email" placeholder="Email" autocomplete="email"></div>
				<div class="input-group"><input type="text" placeholder="Username" autocomplete="username"></div>
				<div class="input-group"><input type="password" placeholder="Password" autocomplete="new-password"></div>
				<div class="input-group"><input type="password" placeholder="Confirm Password" autocomplete="new-password"></div>
				<button type="submit">Dang ky</button>
				<p class="switch-auth">Da co tai khoan? <a href="loginbd.html/login.html">Dang nhap</a></p>
			</form>
		</section>
	</main>

	<iframe class="footer-embed" src="footer.html" title="Site Footer" loading="eager"></iframe>
</body>
</html>
