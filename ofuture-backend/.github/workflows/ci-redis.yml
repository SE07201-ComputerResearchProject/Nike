name: CI - Tests with Redis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --save 60 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Wait for Redis to be ready
        run: |
          for i in {1..30}; do
            if nc -z localhost 6379; then echo "redis up" && break; fi
            echo "waiting for redis..."
            sleep 1
          done

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: npm test -- --runInBand
