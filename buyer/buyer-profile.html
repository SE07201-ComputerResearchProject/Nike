<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O'Future - Buyer Profile</title>
  <link rel="stylesheet" href="css/buyer.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">O'<span>Future</span></div>
      <nav class="nav">
        <a href="buyer-home.html">Dashboard</a>
        <a href="buyer-products.html">Products</a>
        <a href="buyer-cart.html">Cart</a>
        <a href="buyer-checkout.html">Checkout</a>
        <a href="buyer-orders.html">Orders</a>
        <a class="active" href="buyer-profile.html">Profile</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="search-box"><input type="text" placeholder="Tìm kiếm..."></div>
        <div class="top-actions">
          <div class="icon-btn">🔔</div>
          <div class="avatar">N</div>
        </div>
      </div>

      <div class="page-header">
        <h1>Hồ sơ Buyer</h1>
        <p>Cập nhật thông tin cá nhân và địa chỉ nhận hàng.</p>
      </div>

      <section class="card">
        <div class="profile-box">
          <div class="profile-avatar">N</div>
          <div>
            <div class="form-row">
              <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" value="Nguyễn Thị Nghi">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" value="nghi@example.com">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" value="09xxxxxxxx">
              </div>
              <div class="form-group">
                <label>Tên cửa hàng</label>
                <input type="text" value="Tạp hóa Nghi">
              </div>
            </div>

            <div class="form-group">
              <label>Địa chỉ</label>
              <input type="text" value="123 Đường ABC, Quận XYZ, TP.HCM">
            </div>

            <button id="saveProfileBtn" class="btn btn-primary">Lưu thay đổi</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/buyer.js"></script>
</body>
</html>
