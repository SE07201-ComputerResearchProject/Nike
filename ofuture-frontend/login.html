<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Đăng nhập | O'Future</title>
	<link rel="stylesheet" href="login.css">
	<style>
		/* minimal reset for this file */
		:root{box-sizing:border-box}
		*,*::before,*::after{box-sizing:inherit}
	</style>
	<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>
	<!-- <div id="header-placeholder"></div> -->

	<main class="main-container">

		<section class="logo-panel" aria-label="Logo O'Future">
			<img src="Logo.png" alt="O'Future logo" class="logo-image">
		</section>

		<div class="target-area">
			<div id="target" class="basket" role="button" tabindex="0" aria-pressed="false" style="position:relative;display:inline-block">
				<img src="giohang.png" alt="giỏ hàng" style="display:block;max-width:260px;height:auto;">
				<span class="ring inner" aria-hidden="true" style="position:absolute;width:24px;height:24px;left:50.8%;top:47.5%;transform:translate(-50%,-50%);border-radius:50%;opacity:0"></span>
			</div>
		</div>

		<section class="login-box" aria-label="Đăng nhập">
			<div class="login-title">LOGIN</div>
			<form id="loginForm">
				<div id="form-inputs">
					<div class="input-group">
						<input type="email" id="email" name="email" placeholder="Địa chỉ Email" autocomplete="email" required>
					</div>
					<div class="input-group">
						<input type="password" id="password" name="password" placeholder="Mật khẩu" autocomplete="current-password" required>
					</div>

					<div class="input-group" style="display: flex; justify-content: center; margin-bottom: 20px;">
						<div class="g-recaptcha" data-sitekey="6LegvK4sAAAAANbz-6z_kf8nZ1pWzdUGGwodSV4p"></div>
					</div>
				</div>

				<div id="mfaSection" style="display: none; text-align: center;">
					<p style="margin-bottom: 15px; color: #64748b; font-size: 14px;">
						Tài khoản của bạn đang được bảo vệ 2 lớp. Vui lòng nhập mã từ ứng dụng Authenticator.
					</p>
					<div class="input-group">
						<input type="text" id="mfaCode" placeholder="000000" maxlength="6" 
							style="text-align: center; font-size: 24px; letter-spacing: 8px;">
					</div>
					<div style="display: flex; gap: 10px; margin-top: 15px;">
						<button type="button" id="verifyMfaBtn" class="login-btn" style="flex: 2;">Xác nhận OTP</button>
						<button type="button" id="cancelMfaBtn" class="login-btn" style="flex: 1; background: #64748b;">Hủy</button>
					</div>
				</div>

				<button type="submit" id="loginBtn" class="login-btn">Đăng nhập</button>

				<div id="google-signin-button" class="google-btn" style="margin-top: 15px; display: flex; justify-content: center;"></div>
				
				<p class="switch-auth">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
			</form>
		</section>
	</main>

	<div id="footer-placeholder"></div>

	<div id="kicker" class="kicker" aria-hidden="true" style="position:fixed; left:6vw; bottom:12vh; width:120px; height:auto; z-index:800">
		<img src="nguoinembong.png" alt="người ném bóng" style="display:block;width:100%;height:auto;">
		<span id="throw-hand" style="position:absolute;left:78%;top:48%;width:10px;height:10px;display:block;opacity:0;border-radius:50%"></span>
		<span id="kick-foot" style="position:absolute;left:74%;top:82%;width:8px;height:8px;display:block;opacity:0;border-radius:50%"></span>
	</div>

	<div id="ball" class="projectile" aria-hidden="true">
		<img src="money.png" alt="money" class="ball-img" aria-hidden="true">
	</div>
	
	<script src="dashboard-buyer/shared/api.js"></script>
	<script src="load-layout.js"></script>
	<script src="https://accounts.google.com/gsi/client" async defer></script>
	<script src="login.js"></script>

	<script>
	// <![CDATA[  <-- For SVG support
	if ('WebSocket' in window) {
		(function () {
			function refreshCSS() {
				var sheets = [].slice.call(document.getElementsByTagName("link"));
				var head = document.getElementsByTagName("head")[0];
				for (var i = 0; i < sheets.length; ++i) {
					var elem = sheets[i];
					var parent = elem.parentElement || head;
					parent.removeChild(elem);
					var rel = elem.rel;
					if (elem.href && typeof rel != "string" || rel.length == 0 || rel.toLowerCase() == "stylesheet") {
						var url = elem.href.replace(/(&|\?)_cacheOverride=\d+/, '');
						elem.href = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cacheOverride=' + (new Date().valueOf());
					}
					parent.appendChild(elem);
				}
			}
			var protocol = window.location.protocol === 'http:' ? 'ws://' : 'wss://';
			var address = protocol + window.location.host + window.location.pathname + '/ws';
			var socket = new WebSocket(address);
			socket.onmessage = function (msg) {
				if (msg.data == 'reload') window.location.reload();
				else if (msg.data == 'refreshcss') refreshCSS();
			};
			if (sessionStorage && !sessionStorage.getItem('IsThisFirstTime_Log_From_LiveServer')) {
				console.log('Live reload enabled.');
				sessionStorage.setItem('IsThisFirstTime_Log_From_LiveServer', true);
			}
		})();
	}
	else {
		console.error('Upgrade your browser. This Browser is NOT supported WebSocket for Live-Reloading.');
	}
	// ]]>
</script>
</body>
</html>
