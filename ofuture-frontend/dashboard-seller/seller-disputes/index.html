<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Tranh chấp | O'Future Seller</title>
  <link rel="stylesheet" href="../../../ofuture-frontend/dashboard-buyer/shared/buyer.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">O'<span>Future</span> <span class="seller-badge">SELLER</span></div>
      <nav class="nav">
        <a href="../indexSeller.html">Dashboard</a>
        <a class="active" href="index.html">Tranh chấp</a>
        <a href="../seller-wallet/index.html">Ví Tiền</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <button class="btn btn-outline" onclick="window.history.back()" style="padding: 6px 12px; font-size: 14px;">← Quay lại</button>
        <div class="top-actions">
          <div class="avatar" id="headerAvatar">U</div>
          <button id="logoutBtn" class="btn btn-outline">Đăng xuất</button>
        </div>
      </div>

      <div class="page-header">
        <h1>Quản lý Tranh chấp</h1>
        <p>Giao tiếp với người mua để giải quyết tranh chấp.</p>
      </div>

      <div class="filters-container card">
        <div class="tabs" id="statusTabs">
          <button class="tab-btn active" data-status="all">Tất cả</button>
          <button class="tab-btn" data-status="open">Đang mở</button>
          <button class="tab-btn" data-status="in_progress">Đang xử lý</button>
          <button class="tab-btn" data-status="resolved">Đã giải quyết</button>
          <button class="tab-btn" data-status="closed">Đã đóng</button>
        </div>
      </div>

      <div id="disputesContainer" class="disputes-list">
        <p class="muted">Đang tải danh sách tranh chấp...</p>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="../../../ofuture-frontend/dashboard-buyer/shared/api.js"></script>
  <script src="script.js"></script>
</body>
</html>
