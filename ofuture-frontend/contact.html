<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - O'Future</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 42px;
            margin-bottom: 12px;
            letter-spacing: -0.03em;
        }

        .page-header p {
            color: var(--muted);
            font-size: 16px;
        }

        .contact-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 32px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.25s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .contact-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 32px;
        }

        .info-item {
            text-align: center;
            padding: 24px;
            background: var(--soft-bg);
            border-radius: 14px;
        }

        .info-item span {
            font-size: 32px;
            display: block;
            margin-bottom: 12px;
        }

        .info-item h4 {
            font-size: 16px;
            margin-bottom: 6px;
        }

        .info-item p {
            color: var(--muted);
            font-size: 14px;
        }

        .success-message {
            color: #15803d;
            background: #d1fae5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .contact-info {
                grid-template-columns: 1fr;
            }

            .contact-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container nav">
            <a href="index.html" class="logo">
                <span class="logo-mark">O</span>
                <span class="logo-text">O'Future</span>
            </a>
            <nav class="menu">
                <a href="index.html">Trang chủ</a>
                <a href="product.html">Sản phẩm</a>
                <a href="cart.html">Giỏ hàng</a>
                <a href="orders.html">Đơn hàng</a>
                <a href="profile-management.html">Tài khoản</a>
            </nav>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-outline">Đăng nhập</a>
            </div>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <div class="contact-container">
                <div class="page-header">
                    <h1>Liên hệ với chúng tôi</h1>
                    <p>Chúng tôi luôn sẵn sàng hỗ trợ bạn</p>
                </div>

                <div class="contact-card">
                    <form id="contactForm">
                        <div class="form-group">
                            <label>Họ và tên *</label>
                            <input type="text" id="fullName" required placeholder="Nhập họ và tên">
                        </div>

                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="email" required placeholder="email@example.com">
                        </div>

                        <div class="form-group">
                            <label>Chủ đề *</label>
                            <select id="subject" required>
                                <option value="">Chọn chủ đề</option>
                                <option value="general">Câu hỏi chung</option>
                                <option value="support">Hỗ trợ kỹ thuật</option>
                                <option value="business">Hợp tác kinh doanh</option>
                                <option value="feedback">Góp ý</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Nội dung *</label>
                            <textarea id="message" required placeholder="Nhập nội dung tin nhắn..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Gửi tin nhắn</button>
                        
                        <p id="successMessage" class="success-message">
                            ✓ Tin nhắn đã được gửi thành công! Chúng tôi sẽ phản hồi sớm nhất.
                        </p>
                    </form>
                </div>

                <div class="contact-info">
                    <div class="info-item">
                        <span>📧</span>
                        <h4>Email</h4>
                        <p>contact@ofuture.vn</p>
                    </div>

                    <div class="info-item">
                        <span>📞</span>
                        <h4>Hotline</h4>
                        <p>0123 456 789</p>
                    </div>

                    <div class="info-item">
                        <span>📍</span>
                        <h4>Địa chỉ</h4>
                        <p>Việt Nam</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="api.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            // Simulate sending message
            console.log('Contact form submitted:', { fullName, email, subject, message });

            // Show success message
            document.getElementById('successMessage').classList.add('show');

            // Reset form
            this.reset();

            // Hide success message after 5 seconds
            setTimeout(() => {
                document.getElementById('successMessage').classList.remove('show');
            }, 5000);
        });
    </script>
</body>
</html>
