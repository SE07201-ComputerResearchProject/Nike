<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Header</title>
	<style>
		:root{box-sizing:border-box}
		*,*::before,*::after{box-sizing:inherit}
		body{
			margin:0;
			font-family: Arial, sans-serif;
			background:transparent;
		}
		.header-wrap{
			text-align:center;
			padding:28px 10px 6px;
			position: relative;
		}
		.back-home-btn {
			position: absolute;
			left: 10px;
			top: 50%;
			transform: translateY(-50%);
			padding: 8px 16px;
			background-color: #007bff;
			color: white;
			text-decoration: none;
			border-radius: 4px;
			font-size: 14px;
		}
		.back-home-btn:hover {
			background-color: #0056b3;
		}
		.welcome-text{
			margin:0;
			font-size:2em;
			font-weight:700;
			color:#0f172a;
			white-space:nowrap;
		}
		.brand{
			display:inline-block;
			font-weight:800;
			font-family:'Oswald', Arial, sans-serif;
			color:transparent;
			background-image: linear-gradient(90deg,#ff3cac 0%,#ffd166 20%,#7d74ff 50%,#42e695 75%,#ff66bf 100%);
			background-size:200% 100%;
			-webkit-background-clip:text;
			background-clip:text;
			animation: rainbow 6s linear infinite;
			position:relative;
		}
		.brand::after{
			content: attr(data-text);
			position:absolute;
			left:0;
			top:0;
			width:100%;
			height:100%;
			color:transparent;
			-webkit-background-clip:text;
			background-clip:text;
			background-image: linear-gradient(45deg,
				rgba(255,255,255,0) 0%, rgba(255,255,255,0) 40%,
				rgba(255,255,255,0.95) 48%, rgba(255,255,255,0.95) 52%,
				rgba(255,255,255,0) 60%, rgba(255,255,255,0) 100%);
			background-size:300% 300%;
			background-position:150% -50%;
			animation: stripeRTL 2.6s linear infinite;
		}
		@keyframes rainbow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
		@keyframes stripeRTL{0%{background-position:150% -50%}100%{background-position:-50% 150%}}
	</style>
</head>
<body>
	<div class="header-wrap">
		<h1 class="welcome-text">Welcome to <span class="brand" data-text="O'Future">O'Future</span></h1>
	</div>
</body>
</html>
